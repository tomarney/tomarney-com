{{ define "main" }}

<div class="page--bottom">
  <div class="container">

    <header>
      <h1>{{ .Title }}</h1>
      <p>{{ .Params.Subtitle }}</p>
    </header>

    <figure>
      <img src="{{ .Params.MainImg.Src }}" alt="{{ .Params.MainImg.Alt }}">
      <figcaption>{{ .Params.MainImg.Caption }}</figcaption>
    </figure>

    <div class="md">
      {{ .Content }}
    </div>


  </div>

</div>



{{ end }}
